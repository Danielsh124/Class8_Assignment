apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins-task2
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jenkinsci/helm-charts.git
    targetRevision: main
    path: charts/jenkins
  destination:
    server: https://kubernetes.default.svc
    namespace: class8-assignment
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
