apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins-task3
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/YOUR_PRIVATE_REPO.git
    targetRevision: main
    path: jenkins-chart
    helm:
      valueFiles:
        - values.yaml
        - values-nodeport.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins-task3
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
