apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins-task3
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Danielsh124/Class8_Assignment.git
    targetRevision: main
    path: charts/jenkins
    helm:
      valueFiles:
        - values.yaml
        - values-nodeport.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins-task3
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
